name: Sync to GitLab

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git credentials
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_PUSH_TOKEN }}
          GITLAB_HOST: gitlab.mercator-ocean.fr
          GITLAB_PROJECT: pub/edito-infra/resto
        run: |
          git config --global user.name "GitHub Sync Bot"
          git config --global user.email "sync@github.mercator-ocean.fr"
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@${GITLAB_HOST}/${GITLAB_PROJECT}.git
          # Hide token in logs
          git config --global url."https://oauth2:${GITLAB_TOKEN}@${GITLAB_HOST}/".insteadOf "https://${GITLAB_HOST}/"

      - name: Fetch GitLab refs (safety check)
        continue-on-error: true
        run: git fetch gitlab 2>&1 | grep -v oauth2

      - name: Push branches to GitLab
        id: push_branches
        run: |
          git push gitlab --all --force-with-lease
          echo "branches_pushed=true" >> $GITHUB_OUTPUT

      - name: Push tags to GitLab
        id: push_tags
        run: |
          git push gitlab --tags --force-with-lease
          echo "tags_pushed=true" >> $GITHUB_OUTPUT

      - name: Verify sync
        run: |
          echo "Verifying sync..."
          git fetch gitlab
          GITHUB_COMMIT=$(git rev-parse HEAD)
          GITLAB_COMMIT=$(git rev-parse gitlab/$(git rev-parse --abbrev-ref HEAD))
          if [ "$GITHUB_COMMIT" = "$GITLAB_COMMIT" ]; then
            echo "✅ Sync verified: Both repos at same commit"
          else
            echo "⚠️  Sync mismatch (may be temporary)"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Sync to GitLab failed"
          echo "Action: Review logs and check GitLab token validity"
          exit 1